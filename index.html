<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지 파일명 일괄 변경 도구 | Batch Renamer</title>
    <meta name="description" content="여러 개의 이미지 파일명을 쉽고 빠르게 일괄 변경하세요. 드래그 앤 드롭으로 간편하게 관리하세요.">
    
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- JSZip Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1 class="logo">Batch<span>Renamer</span></h1>
            <p class="subtitle">사진 파일명을 한 번에, 더 우아하게 변경하세요.</p>
        </header>

        <main>
            <section class="config-panel glass">
                <div class="input-group">
                    <label for="prefix">파일명 접두사</label>
                    <input type="text" id="prefix" placeholder="예: 여행_제주" value="사진">
                </div>
                <div class="input-group">
                    <label for="startNumber">시작 번호</label>
                    <input type="number" id="startNumber" value="1" min="0">
                </div>
                <div class="input-group">
                    <label for="padding">번호 자릿수</label>
                    <input type="number" id="padding" value="3" min="1" max="5">
                </div>
            </section>

            <section class="drop-zone glass" id="dropZone">
                <div class="drop-content">
                    <div class="icon">📸</div>
                    <p>사진을 여기에 드래그하거나 클릭하여 업로드하세요</p>
                    <span>최대 100MB까지 지원</span>
                </div>
                <input type="file" id="fileInput" multiple accept="image/*" hidden>
            </section>

            <section class="file-list-container glass" id="fileListContainer" style="display: none;">
                <div class="list-header">
                    <h2>업로드된 파일 <span id="fileCount">0</span>개</h2>
                    <button id="downloadBtn" class="primary-btn">일괄 변경 및 다운로드 (ZIP)</button>
                </div>
                <ul class="file-list" id="fileList">
                    <!-- Files will be injected here -->
                </ul>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Batch Renamer. All rights reserved.</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
